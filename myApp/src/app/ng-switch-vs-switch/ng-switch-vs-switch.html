<p>ng-switch-vs-switch works!</p>

<div class="row text-center">
    <div class="col-12 ">
        <button class="btn btn-success m-1" (click)="set(1)">Grade 1</button>
        <button class="btn btn-primary m-1" (click)="set(2)">Grade 2</button>
        <button class="btn btn-warning m-1" (click)="set(3)">Grade 3</button>
    </div>

    <div>
        @switch (grade) {
            @case (1) {
