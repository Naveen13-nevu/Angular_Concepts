
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Loader</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:beige;
}

.loader{
    width:150px;
    height:150px;
    border-radius:50%;
    border:6px solid transparent;
    border-top:8px solid cyan;
    border-right:8px solid rgb(0, 38, 255);

    animation:spin 1.2s linear infinite;
}

@keyframes spin{

0%{
    transform:rotate(0deg) scale(1);
}

50%{
    transform:rotate(180deg) scale(1.2);
}

100%{
    transform:rotate(360deg) scale(1);
}

}

</style>

</head>

<body>

<div class="loader"></div>

</body>
</html>
