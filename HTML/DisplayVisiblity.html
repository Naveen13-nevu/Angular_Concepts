<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

body{
    padding: 30px;
    background: linear-gradient(to right,pink,rgb(69, 69, 237));
}

        .box{
            width: 300px;
            height: 300px;
            background-color : rgb(118, 235, 229); 
        }

    </style>
</head>
<body>
    
    <h2>Visiblities</h2>

    <div class="box" id="box">
        Hello CSS
    </div>

    <button onclick="visiblity()"> visiblity </button>

    <button onclick="display()">display</button>

    <button onclick="show()">show</button>

    <script>

    let box = document.getElementById("box");

    function visiblity(){
        box.style.visibility = "hidden";
    }

    function display() {
        box.style.display= "none";
    }

    function show(){
        box.style.visibility="visible";
        box.style.display ="flex";
    }

    </script>
</body>
</html>
