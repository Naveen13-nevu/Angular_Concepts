<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Playground</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

/* GRID CONTAINER */
.container{

    width:700px;
    height:500px;

    border:4px solid rgb(237, 45, 45);

    display:grid;

    grid-template-columns:120px 120px;
    grid-template-rows:120px 120px;

    background:lightgray;

    /* CHANGE THESE VALUES */

    place-items:center;
    place-content:center;

}

/* GRID ITEMS */

.box{

    width:60px;
    height:60px;

    background:tomato;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:20px;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>

</div>

</body>
</html>
