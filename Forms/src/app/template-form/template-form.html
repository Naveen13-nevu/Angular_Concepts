<h2>Template Driven Form</h2>

<form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)">

  <div>
    <label>Name</label><br>

    <input
      type="text"
      name="name"
      [(ngModel)]="user.name"
      required
      #name="ngModel">

  </div>

  <br>

  <div>
    <label>Email</label><br>

    <input
      type="email"
      name="email"
      [(ngModel)]="user.email"
      required
      email
      #email="ngModel">


  </div>

  <br>

  <div>
    <label>Password</label><br>

    <input
      type="password"
      name="password"
      [(ngModel)]="user.password"
      required
      minlength="6"
      #password="ngModel">


  </div>

  <br>

  <div>

    <label>Gender</label><br>

    <input
      type="radio"
      name="gender"
      value="Male"
      [(ngModel)]="user.gender"> Male

    <input
      type="radio"
      name="gender"
      value="Female"
      [(ngModel)]="user.gender"> Female

  </div>

  <br>


  <div>

    <label>City</label><br>

    <select
      name="city"
      [(ngModel)]="user.city"
      required>

      <option value="">Select City</option>
      <option>Chennai</option>
      <option>Bangalore</option>
      <option>Hyderabad</option>
      <option>Mumbai</option>

    </select>

  </div>

  <br>

  <div>

    <input
      type="checkbox"
      name="acceptTerms"
      [(ngModel)]="user.acceptTerms"
      required>

    Accept Terms & Conditions

  </div>

  <br>

  <button type="submit" [disabled]="userForm.invalid">
    Submit
  </button>

</form>
